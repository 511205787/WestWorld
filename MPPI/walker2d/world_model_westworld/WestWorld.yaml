# config/method/WestWorld.yaml
model_name: WestWorld

# train
epochs: 100 #150 #40
lr: 2e-4
total_steps: 1_000_000
warmup_steps: 10_000
weight_decay: 1e-5
val_every_n_steps: 1000 # 10000 for pretrain
accumulate_grad_batches: 1  # Accumulate gradients over 2 batches to simulate larger batch size

train_batch_size: 14 #64 #128
eval_batch_size: 256 #32 #128

steps_per_epoch: 1

resume_fixed_lr_mode: False
finetune_few_params: False
finetune_last_n_blocks: 6
resume_fixed_lr: 1e-5 # 1e-5 for finetune, 1e-4 for train from scratch
resume_extra_steps: 300

# resume_fixed_lr: 1e-6
# resume_extra_steps: 200
# data related
# 300 for ur5, 300 for a1, 300 for cassie, 1500 for train from scratch

# model parameters
uniform_bins: 256
h_dim: 256
n_blocks: 6 # 6 for default, 2 for control, 9 for dense ssm
n_heads: 4
drop_p: 0.1
max_timestep: 1024  # Upper bound for T
rel_sigma: 0.75
# mamba MoE layer parameters
mamba_cfg:
  state_size: 64
  conv_dimension: 4
  expansion_factor: 2
  num_layers: 1
  num_experts: 4
  top_k: 1
  layernorm_epsilon: 1e-5
  use_switch_mlp: false
  hidden_size: 256
  ffn_hidden_size: 512

