  34:
    robotics_type: cartpole
    xml: robotics_structure_xml/cartpole.xml

    # action channels(1)—— driving force on the cart horizontal slide joint
    #       [ act_type , obj_id , body_name ]
    # note: your global act_types only define torque=0; here torque is reused as a unified force/torque channel; 
    #       in practice this <motor> drives a slide joint (linear force), range [-1, 1].
    actions:
      - [torque, 0, cart]        # motor @ joint "slider" (force on slide), ctrlrange [-1, 1]

    # observation channels(5)—— position(3) + velocity(2) (DMC/EnvPool convention)
    #       [ obs_type , obj_id , body_name ]
    observations:
      # --- position(3) ---------------------------------------------------------
      - [pos_lin, 0, cart]       # x       (cart horizontalposition, m)
      - [cos,    0, pole_1]      # cosθ    (cosine of the pole angle relative to vertical)
      - [sin,    0, pole_1]      # sinθ    (sine of the pole angle relative to vertical)

      # --- velocity(2) ---------------------------------------------------------
      - [v_lin,  0, cart]        # ẋ       (cart horizontalvelocity, m/s)
      - [v_jnt,  0, pole_1]      # θ̇       (hinge angular velocity, rad/s)
  35:
    robotics_type: fish_swim
    xml: robotics_structure_xml/fish_swim.xml

    # action channels(5)—— corresponds to the 5 control channels in the XML
    #       [ act_type , obj_id , body_name ]
    actions:
      - [torque, 0, tail1      ]   # position actuator @ joint "tail1"
      - [torque, 0, tail1      ]   # position actuator @ joint "tail_twist"
      - [torque, 0, torso      ]   # position actuator @ tendon "fins_flap"(across the left and right fins)
      - [torque, 0, finleft    ]   # position actuator @ joint "finleft_pitch"
      - [torque, 0, finright   ]   # position actuator @ joint "finright_pitch"

    # observation channels(24)—— joint_angles(7) + upright(1) + target(3) + velocity(13)
    #       [ obs_type , obj_id , body_name ]
    observations:
      # --- joint_angles (7) -----------------------------------------------------
      - [pos_ang, 0, tail1    ]   # tail1 yaw
      - [pos_ang, 0, tail1    ]   # tail_twist pitch(belong to the same group body=tail1)
      - [pos_ang, 0, tail2    ]   # tail2 yaw
      - [pos_ang, 0, finright ]   # finright_roll
      - [pos_ang, 0, finright ]   # finright_pitch
      - [pos_ang, 0, finleft  ]   # finleft_roll
      - [pos_ang, 0, finleft  ]   # finleft_pitch

      # --- upright (1) ----------------------------------------------------------
      # fish body“uprightness”(e.g. the alignment between the torso z-axis and the world z-axis, a scalar computed by the environment)
      - [upright, 0, torso]

      # --- target (3) — only FishSwim expose ----------------------------------------
      # world-coordinate components of the target ball (x, y, z)
      - [pos_lin, 1, target]
      - [pos_lin, 1, target]
      - [pos_lin, 1, target]

      # --- velocity (13) --------------------------------------------------------
      # root(torso)6 dim: linear velocity(3) + angular velocity(3)
      - [v_lin, 0, torso]      # vx
      - [v_lin, 0, torso]      # vy
      - [v_lin, 0, torso]      # vz
      - [v_ang, 0, torso]      # ωx
      - [v_ang, 0, torso]      # ωy
      - [v_ang, 0, torso]      # ωz
      # 7 joint angular velocities (ordered to correspond to the joint angles above)
      - [v_jnt, 0, tail1   ]   # tail1̇
      - [v_jnt, 0, tail1   ]   # tail_twisṫ
      - [v_jnt, 0, tail2   ]   # tail2̇
      - [v_jnt, 0, finright]   # finright_roll̇
      - [v_jnt, 0, finright]   # finright_pitcḣ
      - [v_jnt, 0, finleft ]   # finleft_roll̇
      - [v_jnt, 0, finleft ]   # finleft_pitcḣ
