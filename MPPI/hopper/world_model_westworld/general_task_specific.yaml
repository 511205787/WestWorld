# ============================================================================
# Task-level items; task_id corresponds to the task label in the dataset
# ============================================================================
tasks:
# ---------------------------------------------------------------------------
# task-id 0, 1, 2  ——  walker-stand / walker-walk / walker-run
#   • There is only one object item -> obj_id is fixed to 0
#   • actiondimension 6, observationdimension 24
# ---------------------------------------------------------------------------
  0:
    robotics_type: walker                    
    xml: robotics_structure_xml/walker.xml
    
    actions:
      - [torque, 0, left_thigh]      # hip_left
      - [torque, 0, left_leg  ]      # knee_left
      - [torque, 0, left_foot ]      # ankle_left
      - [torque, 0, right_thigh]     # hip_right
      - [torque, 0, right_leg ]      # knee_right
      - [torque, 0, right_foot]      # ankle_right

    # observation channels: 24-D
    #  ➜ [ obs_type , obj_id , body_name ]
    observations:
      # --- hinge angles (sin / cos) ----------------------------------------
      - [sin , 0, torso]
      - [cos , 0, torso]

      - [sin , 0, left_thigh]
      - [cos , 0, left_thigh]
      - [sin , 0, left_leg  ]
      - [cos , 0, left_leg  ]
      - [sin , 0, left_foot ]
      - [cos , 0, left_foot ]

      - [sin , 0, right_thigh]
      - [cos , 0, right_thigh]
      - [sin , 0, right_leg ]
      - [cos , 0, right_leg ]
      - [sin , 0, right_foot]
      - [cos , 0, right_foot]

      # --- torso height ----------------------------------------------------
      - [height, 0, torso]

      # --- torso velocities  ----------------------------------------------
      - [v_lin, 0, torso]    # horizontal
      - [v_lin, 0, torso]    # vertical
      - [v_ang, 0, torso]    # pitch-angular

      # --- joint angular velocities ---------------------------------------
      - [v_jnt, 0, left_thigh]
      - [v_jnt, 0, left_leg  ]
      - [v_jnt, 0, left_foot ]
      - [v_jnt, 0, right_thigh]
      - [v_jnt, 0, right_leg ]
      - [v_jnt, 0, right_foot]
  # ---------------------------------------------------------------------------
  1:
    robotics_type: walker                     # optional field, for readability
    xml: robotics_structure_xml/walker.xml

    # action channels: by EnvPool / dm_control torque order
    #  ➜ [ act_type , obj_id , body_name ]
    actions:
      - [torque, 0, left_thigh]      # hip_left
      - [torque, 0, left_leg  ]      # knee_left
      - [torque, 0, left_foot ]      # ankle_left
      - [torque, 0, right_thigh]     # hip_right
      - [torque, 0, right_leg ]      # knee_right
      - [torque, 0, right_foot]      # ankle_right

    # observation channels: 24-dim, order consistent with your existing code
    #  ➜ [ obs_type , obj_id , body_name ]
    observations:
      # --- hinge angles (sin / cos) ----------------------------------------
      - [sin , 0, torso]
      - [cos , 0, torso]

      - [sin , 0, left_thigh]
      - [cos , 0, left_thigh]
      - [sin , 0, left_leg  ]
      - [cos , 0, left_leg  ]
      - [sin , 0, left_foot ]
      - [cos , 0, left_foot ]

      - [sin , 0, right_thigh]
      - [cos , 0, right_thigh]
      - [sin , 0, right_leg ]
      - [cos , 0, right_leg ]
      #****************************
      - [sin , 0, right_foot]
      - [cos , 0, right_foot]

      # --- torso height ----------------------------------------------------
      - [height, 0, torso]

      # --- torso velocities  ----------------------------------------------
      - [v_lin, 0, torso]    # horizontal
      - [v_lin, 0, torso]    # vertical
      - [v_ang, 0, torso]    # pitch-angular

      # --- joint angular velocities ---------------------------------------
      - [v_jnt, 0, left_thigh]
      - [v_jnt, 0, left_leg  ]
      - [v_jnt, 0, left_foot ]
      - [v_jnt, 0, right_thigh]
      - [v_jnt, 0, right_leg ]
      - [v_jnt, 0, right_foot]
      # #####
      # - [sin , 0, torso]
      # - [cos , 0, torso]

      # - [sin , 0, left_thigh]
      # - [cos , 0, left_thigh]
      # - [sin , 0, left_leg  ]
      # - [cos , 0, left_leg  ]
      # - [sin , 0, left_foot ]
      # - [cos , 0, left_foot ]

      # - [sin , 0, right_thigh]
      # - [cos , 0, right_thigh]
      # - [sin , 0, right_leg ]
      # - [cos , 0, right_leg ]
  # ---------------------------------------------------------------------------
