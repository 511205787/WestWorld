# ---------------------------------------------------------------------------
# task-id 3, 21, 22, 23, 24  ——  cheetah-run / cheetah-run-backwards / cheetah-run-front / cheetah-run-back / cheetah-jump
#   • single-object -> obj_id write 0
#   • action 6 dim, observation 17 dim
# ---------------------------------------------------------------------------
  3:
    robotics_type: cheetah
    xml: robotics_structure_xml/cheetah.xml

    # action channels(6)—— by <actuator> order
    #     [ act_type , obj_id , body_name ]
    actions:
      - [torque, 0, bthigh]    # back thigh
      - [torque, 0, bshin ]    # back shin
      - [torque, 0, bfoot ]    # back foot
      - [torque, 0, fthigh]    # front thigh
      - [torque, 0, fshin ]    # front shin
      - [torque, 0, ffoot ]    # front foot

    # observation channels(17)—— EnvPool / dm_control defaultorder
    #     [ obs_type , obj_id , body_name ]
    observations:
      # --- positions ---------------------------------------------------------
      - [height , 0, torso]    # rootz slide     -> verticalheight (m)
      - [pos_ang, 0, torso]    # rooty hinge     -> pitch angle (rad)

      - [pos_ang, 0, bthigh]   # back thigh hinge
      - [pos_ang, 0, bshin ]   # back shin  hinge
      - [pos_ang, 0, bfoot ]   # back foot  hinge
      - [pos_ang, 0, fthigh]   # front thigh hinge
      - [pos_ang, 0, fshin ]   # front shin  hinge
      - [pos_ang, 0, ffoot ]   # front foot  hinge

      # --- velocities --------------------------------------------------------
      - [v_lin , 0, torso]     # rootx slide velocity  (forward, m/s)
      - [v_lin , 0, torso]     # rootz slide velocity  (vertical, m/s)
      - [v_ang , 0, torso]     # rooty hinge  angular vel (rad/s)

      - [v_jnt , 0, bthigh]    # back thigh  angular vel
      - [v_jnt , 0, bshin ]    # back shin   angular vel
      - [v_jnt , 0, bfoot ]    # back foot   angular vel
      - [v_jnt , 0, fthigh]    # front thigh angular vel
      - [v_jnt , 0, fshin ]    # front shin  angular vel
      - [v_jnt , 0, ffoot ]    # front foot  angular vel
  # ---------------------------------------------------------------------------
# ============================================================================
# Task: 4) reacher-easy, 5) reacher-hard
#   • obj_id 0: robot arm(root=body0, contains body1 and fingertip; both joints joint0/joint1 belong to this object)
#   • obj_id 1: target ball (root=target; no actuator; it naturally becomes 1 when ranked by distance to obj0)
#   • action 2 dim; observation 6 dim(θ1, θ2, Δx, Δy, θ̇1, θ̇2)
# ============================================================================
  4:
    robotics_type: reacher
    xml: robotics_structure_xml/reacher.xml

    # Action (2)—— <actuator> order; triplet: [act_type, obj_id, body_name]
    actions:
      - [torque, 0, body0]    # joint0 in body0 on; shoulder joint torque τ0 ∈ [-1,1]
      - [torque, 0, body1]    # joint1 in body1 on; elbow joint torque τ1 ∈ [-1,1]

    # Observation (6)—— and DMC/EnvPool  position(2), to_target(2), velocity(2) align
    observations:
      # joint angle(rad)
      - [pos_ang, 0, body0]   # θ1 (joint0 angle)
      - [pos_ang, 0, body1]   # θ2 (joint1 angle)

      # fingertip-to-target relative displacement (m): Δ = target - fingertip; two planar channels x and y
      # attach the channel to the 'target' node of obj_id=1 here; the environment computes it from target and fingertip
      - [pos_lin, 1, target]  # Δx = target.x - fingertip.x
      - [pos_lin, 1, target]  # Δy = target.y - fingertip.y

      # joint angular velocity(rad/s)
      - [v_jnt,  0, body0]    # θ̇1
      - [v_jnt,  0, body1]    # θ̇2
  # ---------------------------------------------------------------------------
  5:
    robotics_type: reacher
    xml: robotics_structure_xml/reacher.xml

    actions:
      - [torque, 0, body0]
      - [torque, 0, body1]

    observations:
      - [pos_ang, 0, body0]
      - [pos_ang, 0, body1]
      - [pos_lin, 1, target]  # Δx
      - [pos_lin, 1, target]  # Δy
      - [v_jnt,  0, body0]
      - [v_jnt,  0, body1]
  6:
    robotics_type: acrobot
    xml: robotics_structure_xml/acrobot.xml

    # action channels(1)—— only elbow motor
    #       [ act_type , obj_id , body_name ]
    actions:
      - [torque, 0, lower_arm]        # motor @ joint "elbow"

    # observation channels(6)—— DM-control default order
    #       [ obs_type , obj_id , body_name ]
    observations:
      # --- hinge angles (sin / cos) ------------------------------------------
      - [sin , 0, upper_arm]          # θ₁  (shoulder)
      - [cos , 0, upper_arm]
      - [sin , 0, lower_arm]          # θ₂  (elbow)
      - [cos , 0, lower_arm]

      # --- hinge angular velocities -----------------------------------------
      - [v_jnt, 0, upper_arm]         # θ̇₁
      - [v_jnt, 0, lower_arm]         # θ̇₂
# ============================================================================
# Task: 7) pendulum
#   • obj_id 0: single pendulum rod (root=pole; only joint = "hinge"; only motor = "torque")
#   • single-object -> obj_id fixedwrite 0
#   • action 1 dim; observation 3 dim(cos θ, sin θ, θ̇)
# ============================================================================
  7:
    robotics_type: pendulum
    xml: robotics_structure_xml/pendulum.xml

    # action channels(1)—— torque on the base hinge only
    #       [ act_type , obj_id , body_name ]
    actions:
      - [torque, 0, pole]          # motor @ joint "hinge", ctrlrange [-1, 1]

    # observation channels(3)—— orientations(2) + velocity(1)
    #       [ obs_type , obj_id , body_name ]
    observations:
      # --- cos / sin encoding of the hinge angle (dimensionless) ------------------------------
      - [cos,   0, pole]           # cos θ
      - [sin,   0, pole]           # sin θ
      # --- hinge angular velocity(rad/s) ------------------------------------------------
      - [v_jnt, 0, pole]           # θ̇
# ============================================================================
# Task: 8) cartpole
# 8:  cartpole-balance
# 9:  cartpole-balance-sparse
# 10: cartpole-swingup
# 11: cartpole-swingup-sparse
#   • obj_id 0: cart + single pole (root=cart; contains child body pole_1; the controlled joint is the cart slide joint)
#   • single-object -> obj_id fixedwrite 0
#   • action 1 dim; observation 5 dim(x, cosθ, sinθ, ẋ, θ̇)
# ============================================================================
  8:
    robotics_type: cartpole
    xml: robotics_structure_xml/cartpole.xml

    # action channels(1)—— driving force on the cart horizontal slide joint
    #       [ act_type , obj_id , body_name ]
    # note: your global act_types only define torque=0; here torque is reused as a unified force/torque channel; 
    #       in practice this <motor> drives a slide joint (linear force), range [-1, 1].
    actions:
      - [torque, 0, cart]        # motor @ joint "slider" (force on slide), ctrlrange [-1, 1]

    # observation channels(5)—— position(3) + velocity(2) (DMC/EnvPool convention)
    #       [ obs_type , obj_id , body_name ]
    observations:
      # --- position(3) ---------------------------------------------------------
      - [pos_lin, 0, cart]       # x       (cart horizontalposition, m)
      - [cos,    0, pole_1]      # cosθ    (cosine of the pole angle relative to vertical)
      - [sin,    0, pole_1]      # sinθ    (sine of the pole angle relative to vertical)

      # --- velocity(2) ---------------------------------------------------------
      - [v_lin,  0, cart]        # ẋ       (cart horizontalvelocity, m/s)
      - [v_jnt,  0, pole_1]      # θ̇       (hinge angular velocity, rad/s)
  # ---------------------------------------------------------------------------
  9:
