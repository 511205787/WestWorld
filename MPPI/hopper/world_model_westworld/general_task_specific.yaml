# ============================================================================
# Task: 12) ball-in-cup (BallInCupCatch-v1)
#   • obj_id 0: cup(root=cup; joint cup_x(x axis), cup_z(z axis);  motor infor)
#   • obj_id 1: ball(root=ball; connected by a spatial tendon; it has its own ball_x/ball_z sliding joints, but no actuator)
#   • action 2 dim; observation 8 dim(position 4: cup.x, cup.z, ball.x, ball.z; velocity 4: corresponds to ẋ, ż)
#   • Runtime parameters: frame_skip=1, max_episode_steps=1000 (DMC/EnvPool convention)
# ============================================================================
  12:
    robotics_type: ball_in_cup
    xml: robotics_structure_xml/ball_in_cup.xml

    # action channels(2)—— 2-DoF in-plane cup sliding (x / z)
    #       [ act_type , obj_id , body_name ]
    # note: global act_types only define torque=0; here it is reused as a unified force/torque channel; 
    #       in practice the <motor> drives a slide joint (linear force), range [-1, 1].
    actions:
      - [torque, 0, cup]    # motor @ joint "cup_x"  (linear drive along the x axis, ctrlrange [-1,1])
      - [torque, 0, cup]    # motor @ joint "cup_z"  (linear drive along the z axis, ctrlrange [-1,1])

    # observation channels(8)—— position(4) + velocity(4)(DMC/EnvPool public spec)
    #       [ obs_type , obj_id , body_name ]
    observations:
      # --- position (4) --------------------------------------------------------
      - [pos_lin, 0, cup ]   # cup.x    (cup x-direction slider position, m)
      - [pos_lin, 0, cup ]   # cup.z    (cup z-direction slider position, m)
      - [pos_lin, 1, ball]   # ball.x   (ball x directionposition, m)
      - [pos_lin, 1, ball]   # ball.z   (ball z directionposition, m)

      # --- velocity (4) --------------------------------------------------------
      - [v_lin,  0, cup ]    # cup.ẋ    (cup x directionvelocity, m/s)
      - [v_lin,  0, cup ]    # cup.ż    (cup z directionvelocity, m/s)
      - [v_lin,  1, ball]    # ball.ẋ   (ball x directionvelocity, m/s)
      - [v_lin,  1, ball]    # ball.ż   (ball z directionvelocity, m/s)
# ============================================================================
# Task: 13) finger-spin
#   • obj_id 0: finger (root=proximal; contains distal; two motors: proximal / distal)
#   • obj_id 1: spinner (root=spinner; only the hinge angle and angular velocity are observed; no actuator)
#   • action 2 dim; observation 9 dim(position(4) + velocity(3) + target_position(2))
# ============================================================================
  13:
    robotics_type: finger_turn_bodies
    xml: robotics_structure_xml/finger_turn_bodies.xml

    # action channels(2)—— hinge torques on the two finger segments ([-1, 1])
    #       [ act_type , obj_id , body_name ]
    actions:
      - [torque, 0, proximal]      # motor @ joint "proximal"
      - [torque, 0, distal]        # motor @ joint "distal"

    # observation channels(9)—— position(4) + velocity(3) + target_position(2)
    #       [ obs_type , obj_id , body_name ]
    observations:
      # --- position(4) ---------------------------------------------------------
      - [pos_ang, 0, proximal]     # finger proximal angle (rad)
      - [pos_ang, 0, distal  ]     # finger distal   angle (rad)
      - [sin,     1, spinner ]     # sin(θ_hinge) of spinner
      - [cos,     1, spinner ]     # cos(θ_hinge) of spinner
      # --- velocity(3) ---------------------------------------------------------
      - [v_jnt,   0, proximal]     # θ̇_proximal
      - [v_jnt,   0, distal  ]     # θ̇_distal
      - [v_jnt,   1, spinner ]     # θ̇_hinge
      # --- target_position(2) (target point in world coordinates)-----------------------------------
      - [pos_lin, 1, target  ]     # target.x
      - [pos_lin, 1, target  ]     # target.z

# ============================================================================
# Task: 14) finger-turn-easy
#   • obj_id 0: ; obj_id 1: 
#   • action 2 dim; observation 12 dim(position(4) + velocity(3) + touch(2) + target_position(2) + dist_to_target(1))
#   • and hard : /(and), channelconsistent
# ============================================================================
  14:
    robotics_type: finger_turn_bodies
    xml: robotics_structure_xml/finger_turn_bodies.xml

    actions:
      - [torque, 0, proximal]
      - [torque, 0, distal]

    observations:
      # --- position(4) ---------------------------------------------------------
      - [pos_ang, 0, proximal]
      - [pos_ang, 0, distal  ]
      - [sin,     1, spinner ]     # sin(θ_hinge)
      - [cos,     1, spinner ]     # cos(θ_hinge)
      # --- velocity(3) ---------------------------------------------------------
      - [v_jnt,   0, proximal]
      - [v_jnt,   0, distal  ]
      - [v_jnt,   1, spinner ]
      # --- touch(2): finger tactile sensing ----------------------------------------------------
      - [touch,   0, touchtop   ]  # touch sensor @ site "touchtop"
      - [touch,   0, touchbottom]  # touch sensor @ site "touchbottom"
      # --- target_position(2) ---------------------------------------------------
      - [pos_lin, 1, target ]      # target.x
      - [pos_lin, 1, target ]      # target.z
      # --- dist_to_target(1) ----------------------------------------------------
      - [dist,    1, target ]      # ‖ tip(site 'tip') - target ‖

# ============================================================================
# Task: 15) finger-turn-hard
#   • channels fully consistent with finger-turn-easy (observation 12 dim, action 2 dim)
#   • higher difficulty (smaller / stricter target), used for more challenging tracking / alignment tasks
# ============================================================================
  15:
    robotics_type: finger_turn_bodies
    xml: robotics_structure_xml/finger_turn_bodies.xml

    actions:
      - [torque, 0, proximal]
      - [torque, 0, distal]

    observations:
      # --- position(4) ---------------------------------------------------------
      - [pos_ang, 0, proximal]
      - [pos_ang, 0, distal  ]
      - [sin,     1, spinner ]
      - [cos,     1, spinner ]
      # --- velocity(3) ---------------------------------------------------------
      - [v_jnt,   0, proximal]
      - [v_jnt,   0, distal  ]
      - [v_jnt,   1, spinner ]
      # --- touch(2) -------------------------------------------------------------
      - [touch,   0, touchtop   ]
      - [touch,   0, touchbottom]
      # --- target_position(2) ---------------------------------------------------
      - [pos_lin, 1, target ]
      - [pos_lin, 1, target ]
      # --- dist_to_target(1) ----------------------------------------------------
      - [dist,    1, target ]
# ============================================================================
# Task: 16) fish-swim
#   • obj_id 0: fish body (root=torso; contains tail1/tail2 and left/right fins finleft/finright)
#   • obj_id 1: target ball (root=target; no actuator; only FishSwim exposes the 3-dim target observation)
#   • action 5 dim; observation 24 dim = joint_angles(7) + upright(1) + target(3) + velocity(13)
#   • Runtime parameters (informational): frame_skip=10, max_episode_steps=1000
#   • note: In this XML, the 5 actuators use position control / tendon control; here act_types.torque is reused as the unified action channel
#           to represent applied joint / tendon inputs, while staying consistent with this task family.
# ============================================================================
  16:
    robotics_type: fish_swim
    xml: robotics_structure_xml/fish_swim.xml

    # action channels(5)—— corresponds to the 5 control channels in the XML
    #       [ act_type , obj_id , body_name ]
    actions:
      - [torque, 0, tail1      ]   # position actuator @ joint "tail1"
      - [torque, 0, tail1      ]   # position actuator @ joint "tail_twist"
      - [torque, 0, torso      ]   # position actuator @ tendon "fins_flap"(across the left and right fins)
      - [torque, 0, finleft    ]   # position actuator @ joint "finleft_pitch"
      - [torque, 0, finright   ]   # position actuator @ joint "finright_pitch"

    # observation channels(24)—— joint_angles(7) + upright(1) + target(3) + velocity(13)
    #       [ obs_type , obj_id , body_name ]
    observations:
      # --- joint_angles (7) -----------------------------------------------------
      - [pos_ang, 0, tail1    ]   # tail1 yaw
      - [pos_ang, 0, tail1    ]   # tail_twist pitch(belong to the same group body=tail1)
      - [pos_ang, 0, tail2    ]   # tail2 yaw
      - [pos_ang, 0, finright ]   # finright_roll
      - [pos_ang, 0, finright ]   # finright_pitch
      - [pos_ang, 0, finleft  ]   # finleft_roll
      - [pos_ang, 0, finleft  ]   # finleft_pitch

      # --- upright (1) ----------------------------------------------------------
      # fish body“uprightness”(e.g. the alignment between the torso z-axis and the world z-axis, a scalar computed by the environment)
      - [upright, 0, torso]

      # --- target (3) — only FishSwim expose ----------------------------------------
      # world-coordinate components of the target ball (x, y, z)
      - [pos_lin, 1, target]
      - [pos_lin, 1, target]
      - [pos_lin, 1, target]

      # --- velocity (13) --------------------------------------------------------
      # root(torso)6 dim: linear velocity(3) + angular velocity(3)
      - [v_lin, 0, torso]      # vx
      - [v_lin, 0, torso]      # vy
      - [v_lin, 0, torso]      # vz
      - [v_ang, 0, torso]      # ωx
      - [v_ang, 0, torso]      # ωy
      - [v_ang, 0, torso]      # ωz
      # 7 joint angular velocities (ordered to correspond to the joint angles above)
      - [v_jnt, 0, tail1   ]   # tail1̇
      - [v_jnt, 0, tail1   ]   # tail_twisṫ
      - [v_jnt, 0, tail2   ]   # tail2̇
      - [v_jnt, 0, finright]   # finright_roll̇
      - [v_jnt, 0, finright]   # finright_pitcḣ
      - [v_jnt, 0, finleft ]   # finleft_roll̇
      - [v_jnt, 0, finleft ]   # finleft_pitcḣ
