#   • obj_id 0: cart-double-pole system (cart + pole + pole2)
#   • 1-dim action (apply horizontal force to the slider joint)
#   • 11-dim observation: x, sinθ1, sinθ2, cosθ1, cosθ2, (ẋ, θ̇1, θ̇2), constraint reaction forces (3)
#   • Reference: EnvPool notes on the observation breakdown and range for InvertedDoublePendulum.
