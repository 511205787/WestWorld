    # -------------------------
    observations:
      # --- qpos[1:] total 8 ---
      - [height , 0, torso]    # rootz        ← torsoheight (m)
      - [pos_ang, 0, torso]    # rooty        ← torso pitch angle (rad)
      - [pos_ang, 0, bthigh]   # bthigh       ← jointangle (rad)
      - [pos_ang, 0, bshin]    # bshin        ← jointangle (rad)
      - [pos_ang, 0, bfoot]    # bfoot        ← jointangle (rad)
      - [pos_ang, 0, fthigh]   # fthigh       ← jointangle (rad)
      - [pos_ang, 0, fshin]    # fshin        ← jointangle (rad)
      - [pos_ang, 0, ffoot]    # ffoot        ← jointangle (rad)

      # --- qvel total 9 ---
      - [v_lin,  0, torso]     # rootx velocity   ← torso x linear velocity (m/s)
      - [v_lin,  0, torso]     # rootz velocity   ← torso z linear velocity (m/s)
      - [v_ang,  0, torso]     # rooty angular velocity ← torso pitch angular velocity (rad/s)
      - [v_jnt,  0, bthigh]    # bthigh       ← angular velocity (rad/s)
      - [v_jnt,  0, bshin]     # bshin        ← angular velocity (rad/s)
