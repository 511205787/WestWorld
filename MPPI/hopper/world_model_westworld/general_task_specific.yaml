  128:
    robotics_type: go2_mppi
    xml: robotics_structure_xml/go2_mppi.xml

    # ========== Action (12)==========
    # order <actuator>  motor order: 
    # FR_hip, FR_thigh, FR_calf, FL_hip, FL_thigh, FL_calf, RR_hip, RR_thigh, RR_calf, RL_hip, RL_thigh, RL_calf
    actions:
      - [torque, 0, FR_hip]     # 0 -> FR_hip_joint
      - [torque, 0, FR_thigh]   # 1 -> FR_thigh_joint
      - [torque, 0, FR_calf]    # 2 -> FR_calf_joint
      - [torque, 0, FL_hip]     # 3 -> FL_hip_joint
      - [torque, 0, FL_thigh]   # 4 -> FL_thigh_joint
      - [torque, 0, FL_calf]    # 5 -> FL_calf_joint
      - [torque, 0, RR_hip]     # 6 -> RR_hip_joint
      - [torque, 0, RR_thigh]   # 7 -> RR_thigh_joint
      - [torque, 0, RR_calf]    # 8 -> RR_calf_joint
      - [torque, 0, RL_hip]     # 9 -> RL_hip_joint
      - [torque, 0, RL_thigh]   # 10 -> RL_thigh_joint
      - [torque, 0, RL_calf]    # 11 -> RL_calf_joint

    # ========== Observation (37)==========
    # MuJoCo real DOF order( worldbody/joint ): 
    #
    # qpos[0:7]  = base_link: 3 position + 4 quaternion(w,x,y,z)
    # qpos[7:19] = 12 joint angle, order: 
    #              FL_hip, FL_thigh, FL_calf,
    #              FR_hip, FR_thigh, FR_calf,
    #              RL_hip, RL_thigh, RL_calf,
    #              RR_hip, RR_thigh, RR_calf
    #
    # qvel[0:6]  = base_link: 3 linear velocity + 3 angular velocity
    # qvel[6:18] = 12 joint angular velocity, orderon
    #
    #  37 dim obs isbyorder“”.
    observations:
      # --- base position(3)---
      - [pos_lin, 0, base_link]   # x = qpos[0]
      - [pos_lin, 0, base_link]   # y = qpos[1]
      - [pos_lin, 0, base_link]   # z = qpos[2]

      # --- base orientation quaternion(4, w x y z)---
      - [quat, 0, base_link]      # w = qpos[3]
      - [quat, 0, base_link]      # x = qpos[4]
      - [quat, 0, base_link]      # y = qpos[5]
      - [quat, 0, base_link]      # z = qpos[6]

      # --- 12× joint angle(by Go2 realorder: FL -> FR -> RL -> RR)---
      - [pos_ang, 0, FL_hip]      # qpos[7]
      - [pos_ang, 0, FL_thigh]    # qpos[8]
      - [pos_ang, 0, FL_calf]     # qpos[9]
      - [pos_ang, 0, FR_hip]      # qpos[10]
      - [pos_ang, 0, FR_thigh]    # qpos[11]
      - [pos_ang, 0, FR_calf]     # qpos[12]
      - [pos_ang, 0, RL_hip]      # qpos[13]
      - [pos_ang, 0, RL_thigh]    # qpos[14]
      - [pos_ang, 0, RL_calf]     # qpos[15]
      - [pos_ang, 0, RR_hip]      # qpos[16]
      - [pos_ang, 0, RR_thigh]    # qpos[17]
      - [pos_ang, 0, RR_calf]     # qpos[18]

      # --- base linear velocity(3)---
      - [v_lin, 0, base_link]     # vx = qvel[0]
      - [v_lin, 1, base_link]     # vy = qvel[1]
      - [v_lin, 2, base_link]     # vz = qvel[2]

      # --- base angular velocity(3)---
      - [v_ang, 0, base_link]     # wx = qvel[3]
      - [v_ang, 1, base_link]     # wy = qvel[4]
      - [v_ang, 2, base_link]     # wz = qvel[5]

      # --- 12× joint angular velocity(order FL -> FR -> RL -> RR)---
      - [v_jnt, 0, FL_hip]        # qvel[6]
      - [v_jnt, 0, FL_thigh]      # qvel[7]
      - [v_jnt, 0, FL_calf]       # qvel[8]
      - [v_jnt, 0, FR_hip]        # qvel[9]
      - [v_jnt, 0, FR_thigh]      # qvel[10]
      - [v_jnt, 0, FR_calf]       # qvel[11]
      - [v_jnt, 0, RL_hip]        # qvel[12]
      - [v_jnt, 0, RL_thigh]      # qvel[13]
      - [v_jnt, 0, RL_calf]       # qvel[14]
      - [v_jnt, 0, RR_hip]        # qvel[15]
      - [v_jnt, 0, RR_thigh]      # qvel[16]
      - [v_jnt, 0, RR_calf]       # qvel[17]
  129:
    robotics_type: hopper_gym
    xml: robotics_structure_xml/hopper_gym.xml

    # action space (3), range [-1, 1], corresponds to XML inthree motors (in order)
    actions:
      - [torque, 0, thigh]   # applied tothighjoint
      - [torque, 0, leg]     # applied toshinjoint
      - [torque, 0, foot]    # applied toanklejoint

    # observation space (11): qpos[1:]  5 values + qvel  6 values
    # mappingsee Gym Hopper docs Observation list(defaultexclude x position).:contentReference[oaicite:1]{index=1}
    observations:
      # --- from qpos[1:]: 5 items ---
      - [rootx , 0, torso]   # root x
      - [height ,  0, torso]         # body height(z), from slide joint rootz
      - [pos_ang, 0, torso]          # bodypitch angle(torso), from hinge joint rooty
      - [pos_ang, 0, thigh]    # thighjoint angle
      - [pos_ang, 0, leg]      # shinjoint angle
      - [pos_ang, 0, foot]     # anklejoint angle

      # --- from qvel: 6 items ---
      - [v_lin,  0, torso]           # torso x directionlinear velocity(rootx is slide jointvelocity)
      - [v_lin,  0, torso]           # torso z directionlinear velocity
      - [v_ang,  0, torso]           # torsoaround y axisangular velocity
      - [v_jnt,  0, thigh]     # thighjoint angular velocity
      - [v_jnt,  0, leg]       # shinjoint angular velocity
      - [v_jnt,  0, foot]      # anklejoint angular velocity
  130:
    robotics_type: walker2d
    xml: robotics_structure_xml/walker2d.xml

    # action space: 6 dim, range [-1, 1](torque, by XML in actuator order)
    # reference: Gymnasium Walker2D action spaceas Box(-1, 1, (6,))
    actions:
      - [torque, 0, thigh]            # -> thigh_joint
      - [torque, 0, leg]              # -> leg_joint
      - [torque, 0, foot]             # -> foot_joint
      - [torque, 0, thigh_left]       # -> thigh_left_joint
      - [torque, 0, leg_left]         # -> leg_left_joint
      - [torque, 0, foot_left]        # -> foot_left_joint

    # observation space: 17 dim
    # convention: first 8 dim = qpos[1:](exclude rootx), last 9 dim = qvel
    # mappingandofficial pageconsistent(rootz, rooty + 6 items;  rootx/rootz/rooty velocity + 6 itemsjoint angular velocity)
    observations:
      # --- qpos[1:] total 8 ---
      - [pos_lin, 0, torso]           # rootz: torsoheight(slide z)
      - [pos_ang, 0, torso]           # rooty: torso pitch(hinge)
      - [pos_jnt, 0, thigh]           # thigh_joint
      - [pos_jnt, 0, leg]             # leg_joint
      - [pos_jnt, 0, foot]            # foot_joint
      - [pos_jnt, 0, thigh_left]      # thigh_left_joint
      - [pos_jnt, 0, leg_left]        # leg_left_joint
      - [pos_jnt, 0, foot_left]       # foot_left_joint

      # --- qvel total 9 ---
      - [v_lin,  0, torso]            # rootx  : torso x directionlinear velocity
      - [v_lin,  0, torso]            # rootz  : torso z directionlinear velocity
      - [v_ang,  0, torso]            # rooty  : torsoangular velocity
      - [v_jnt,  0, thigh]            # thigh_joint   angular velocity
      - [v_jnt,  0, leg]              # leg_joint     angular velocity
      - [v_jnt,  0, foot]             # foot_joint    angular velocity
      - [v_jnt,  0, thigh_left]       # thigh_left_joint angular velocity
      - [v_jnt,  0, leg_left]         # leg_left_joint   angular velocity
      - [v_jnt,  0, foot_left]        # foot_left_joint  angular velocity              
