# ============================================================================
# 32) quadruped-walk / quadruped-run
#   • obj_id 0: body tree (root=torso, containing four legs hip->knee->ankle->toe)
#   • action 12 dim: 3 channels per leg (yaw / lift / extend)
#   • Observation: covers joint angles/velocities, body root velocity, foot-end torque, and optional ray-based distance sensing
#     - DM Control reports that Quadruped uses 3 controls per leg, for 12-dim action in total; the state is high-dimensional and contains multiple sensor types. 
#       This mapping corresponds one-to-one with the given XML <actuator>/<sensor> layout, making upper-layer slicing easier. 
#       References: Control Suite tech report and official blog. 
# ============================================================================
  32:
    robotics_type: quadruped
    xml: robotics_structure_xml/quadruped.xml

    # action channels(12)—— corresponds to XML in 12 items general actuator
    #       [ act_type , obj_id , body_name ]
    actions:
      # --- front_left ---------------------------------------------------------
      - [torque, 0, hip_front_left   ]   # yaw_front_left      (@ joint)
      - [torque, 0, hip_front_left   ]   # lift_front_left     (@ tendon)
      - [torque, 0, hip_front_left   ]   # extend_front_left   (@ tendon)

      # --- front_right --------------------------------------------------------
      - [torque, 0, hip_front_right  ]   # yaw_front_right
      - [torque, 0, hip_front_right  ]   # lift_front_right
      - [torque, 0, hip_front_right  ]   # extend_front_right

      # --- back_right ---------------------------------------------------------
      - [torque, 0, hip_back_right   ]   # yaw_back_right
      - [torque, 0, hip_back_right   ]   # lift_back_right
      - [torque, 0, hip_back_right   ]   # extend_back_right

      # --- back_left ----------------------------------------------------------
      - [torque, 0, hip_back_left    ]   # yaw_back_left
      - [torque, 0, hip_back_left    ]   # lift_back_left
      - [torque, 0, hip_back_left    ]   # extend_back_left

    # observation channels -- based on XML <sensor> and joint/foot naming
    #       [ obs_type , obj_id , body_name ]
    observations:
      # -----------------------------------------------------------------------
      # joint position (16): 4 joint angles per leg, yaw/pitch/knee/ankle
      # -----------------------------------------------------------------------
      - [pos_ang, 0, hip_front_left   ]   # yaw_front_left
      - [pos_ang, 0, hip_front_left   ]   # pitch_front_left
      - [pos_ang, 0, knee_front_left  ]   # knee_front_left
      - [pos_ang, 0, ankle_front_left ]   # ankle_front_left

      - [pos_ang, 0, hip_front_right  ]   # yaw_front_right
      - [pos_ang, 0, hip_front_right  ]   # pitch_front_right
      - [pos_ang, 0, knee_front_right ]   # knee_front_right
      - [pos_ang, 0, ankle_front_right]   # ankle_front_right

      - [pos_ang, 0, hip_back_right   ]   # yaw_back_right
      - [pos_ang, 0, hip_back_right   ]   # pitch_back_right
      - [pos_ang, 0, knee_back_right  ]   # knee_back_right
      - [pos_ang, 0, ankle_back_right ]   # ankle_back_right

      - [pos_ang, 0, hip_back_left    ]   # yaw_back_left
      - [pos_ang, 0, hip_back_left    ]   # pitch_back_left
      - [pos_ang, 0, knee_back_left   ]   # knee_back_left
      - [pos_ang, 0, ankle_back_left  ]   # ankle_back_left

      # --- joint angular velocity velocity (16) ---------------------------------------------
      - [v_jnt, 0, hip_front_left ]
      - [v_jnt, 0, hip_front_left ]
      - [v_jnt, 0, knee_front_left]
      - [v_jnt, 0, ankle_front_left]

      - [v_jnt, 0, hip_front_right]
      - [v_jnt, 0, hip_front_right]
      - [v_jnt, 0, knee_front_right]
      - [v_jnt, 0, ankle_front_right]

      - [v_jnt, 0, hip_back_right ]
      - [v_jnt, 0, hip_back_right ]
      - [v_jnt, 0, knee_back_right]
      - [v_jnt, 0, ankle_back_right]

      - [v_jnt, 0, hip_back_left  ]
      - [v_jnt, 0, hip_back_left  ]
      - [v_jnt, 0, knee_back_left ]
      - [v_jnt, 0, ankle_back_left]

      # --- actuator activation (12) = data.act -------------------------------------------
      # if you already have obs_types, you can name this act; otherwise it can be bundled with position/velocity for reading.
      - [act, 0, hip_front_left ]
      - [act, 0, hip_front_left ]
      - [act, 0, hip_front_left ]
      - [act, 0, hip_front_right]
      - [act, 0, hip_front_right]
      - [act, 0, hip_front_right]
      - [act, 0, hip_back_right ]
      - [act, 0, hip_back_right ]
      - [act, 0, hip_back_right ]
      - [act, 0, hip_back_left  ]
      - [act, 0, hip_back_left  ]
      - [act, 0, hip_back_left  ]

      # --- torso linear velocity (local-frame velocimeter) (3) -----------------------------------
      - [v_lin, 0, torso]   # vx
      - [v_lin, 0, torso]   # vy
      - [v_lin, 0, torso]   # vz

      # --- uprightness(scalar)(1) ----------------------------------------------------
      - [upright, 0, torso] # dot product of torso z and world z

      # --- IMU(gyro + accel)(6) -----------------------------------------------
      - [imu, 0, torso]     # gx, gy, gz, ax, ay, az
      - [imu, 0, torso]     # gx, gy, gz, ax, ay, az
      - [imu, 0, torso]     # gx, gy, gz, ax, ay, az
      - [imu, 0, torso]     # gx, gy, gz, ax, ay, az
      - [imu, 0, torso]     # gx, gy, gz, ax, ay, az
      - [imu, 0, torso]     # gx, gy, gz, ax, ay, az

      # --- toe force and torque (4 feet × (force3 + torque3) = 24) ------------------------
      - [force , 0, toe_front_left ]
      - [force , 0, toe_front_left ]
      - [force , 0, toe_front_left ]
      - [torque, 0, toe_front_left ]
      - [torque, 0, toe_front_left ]
      - [torque, 0, toe_front_left ]

      - [force , 0, toe_front_right]
      - [force , 0, toe_front_right]
      - [force , 0, toe_front_right]
      - [torque, 0, toe_front_right]
      - [torque, 0, toe_front_right]
      - [torque, 0, toe_front_right]

      - [force , 0, toe_back_right ]
      - [force , 0, toe_back_right ]
      - [force , 0, toe_back_right ]
      - [torque, 0, toe_back_right ]
      - [torque, 0, toe_back_right ]
      - [torque, 0, toe_back_right ]

      - [force , 0, toe_back_left  ]
      - [force , 0, toe_back_left  ]
      - [force , 0, toe_back_left  ]
      - [torque, 0, toe_back_left  ]
      - [torque, 0, toe_back_left  ]
      - [torque, 0, toe_back_left  ]
