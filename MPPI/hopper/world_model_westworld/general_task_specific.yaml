      - [sin, 0, thumb     ]     # thumb
      - [cos, 0, thumb     ]
      - [sin, 0, thumbtip  ]     # thumbtip
      - [cos, 0, thumbtip  ]
      - [sin, 0, finger    ]     # finger
      - [cos, 0, finger    ]
      - [sin, 0, fingertip ]     # fingertip
      - [cos, 0, fingertip ]

      # --- arm_vel (8) -------------------------------------------------------
      - [v_jnt, 0, upper_arm ]   # arm_rooṫ
      - [v_jnt, 0, middle_arm]   # arm_shouldeṙ
      - [v_jnt, 0, lower_arm ]   # arm_elboẇ
      - [v_jnt, 0, hand      ]   # arm_wrisṫ
      - [v_jnt, 0, thumb     ]   # thumḃ
      - [v_jnt, 0, thumbtip  ]   # thumbtiṗ
      - [v_jnt, 0, finger    ]   # fingeṙ
      - [v_jnt, 0, fingertip ]   # fingertiṗ

