# common
model_name: MLPEnsemble

# train
epochs: 100 #150 #40
lr: 1e-4
total_steps: 1_000_000
warmup_steps: 10_000
weight_decay: 1e-5
val_every_n_steps: 10000  # Validate every 500 steps (was 10000, but only 563 batches per epoch)
accumulate_grad_batches: 1  # Accumulate gradients over 2 batches to simulate larger batch size

n_ensemble: 7
n_elites: 5

train_batch_size: 256 #64 #128
eval_batch_size: 256 #32 #128

# knowledge distillation (offline precompute teacher targets), see scripts/precompute_kd_teacher.py
kd:
  enabled: False
  alpha: 0.5
  teacher_ckpt: null
  teacher_h5_dir: ./dog_mppi_kd_mlp
  teacher_val_h5_dir: ./dog_mppi_kd_mlp
  precompute_batch_size: 128
  overwrite_teacher_h5: false

# Ensemble-specific parameters
max_obs_dim: 90
max_act_dim: 30
holdout_ratio: 0.2
max_epochs_since_update: 5
logvar_loss_coef: 0.01
dynamics_hidden_dims: [640, 640, 640, 640]
dynamics_weight_decay: [2.5e-5, 5e-5, 7.5e-5, 7.5e-5, 1e-4]
penalty_coef: 0.0  # For uncertainty penalty in rollouts

rollout_horizon: 5       # multi-step rollout horizon for regularization
multi_step_coef: 0.1     # multi step loss weights
steps_per_epoch: 1

# few-shot finetune
resume_fixed_lr_mode: False
resume_fixed_lr: 1e-5 # 1e-5 for finetune, 1e-4 for train from scratch
resume_extra_steps: 300
# 300 for ur5, 300 for a1, 300 for cassie, 1500 for train from scratch
# data related


